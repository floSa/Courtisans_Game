name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install project (CPU torch)
        run: |
          uv pip install --system torch --index-url https://download.pytorch.org/whl/cpu
          uv pip install --system numpy pillow streamlit pytest ruff

      - name: Lint (ruff)
        run: ruff check .

      - name: Run tests
        run: pytest -q
